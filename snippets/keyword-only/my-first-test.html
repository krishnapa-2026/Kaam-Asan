<script type="text/javascript">
    var domainText = "";
    var domainLink = "";
    var newDomainLink,href;
    function formatViewAfterLoad(){
        try{
            domainText = <tag:advertiser_adv />;
            domainLink = <tag:advertiser_domain />;
            var hostName=domainLink.split("/");
            var splitDomainLink = hostName[2].split(".");
            var subDomainList=["related","listings","content","topics","search"];
            href=domainLink;
            for(var i=0;i<subDomainList.length;i++){
                if(splitDomainLink[0]==subDomainList[i]){
                    newDomainLink=domainLink.replace(subDomainList[i]+".","");
                    href=newDomainLink;
                }
            }
            var brandDiv = document.getElementById("brand_txt");
            brandDiv.innerHTML = "<a href="+href+" target='_blank'>"+domainText+"</a>";
        }
        catch(err){
            console.log(err);
        }
    }
</script>

<script>
  function copyAdvertiserToBrandText() {
  const advertiserAnchor = document.querySelector('.advertiser a');
  const brandTextDiv = document.getElementById('brand_txt');
  if (advertiserAnchor && brandTextDiv) {
      brandTextDiv.innerHTML = advertiserAnchor.outerHTML;
  }
}

window.onload = copyAdvertiserToBrandText;

</script>

<!-- Font-responsive Script  -->
<script>

var bufferTitle = 5;
var bufferDesc = 5;

  var CharConfig = {
  title: '',
  desc: ''
  }

  var mainConfigTitle = [
      {
          title: {
              min: 1,
              max: 20
          },
          className: 'title_font_26' 
      },
      {
          title: {
              min: 21,
              max: 40
          },
          className: 'title_font_23'
      },
      {
          title: {
              min: 41,
              max: 60
          },
          className: 'title_font_14'
      },
      {
          title: {
              min: 61,
              max: 90
          },
          className: 'title_font_14'
      },
      {
        title: {
              min: 91,
              max: 120
          },
          className: 'title_font_11'
      },
      {
        title: {
              min: 121,
              max: 150
          },
          className: 'title_font_9'
      }
  ]

  var mainConfigDesc = [
  {
          desc: {
              min: 1,
              max: 50
          },
          className: 'desc_font_12' 
      },

      {
          desc: {
              min: 51,
              max: 100
          },
          className: 'desc_font_9' 
      },

      {
          desc: {
              min: 101,
              max: 150
          },
          className: 'desc_font_8' 
      }

  ]
  
  function formatViewAfterLoad() {
      CharConfig.title = getTitleCharLen();
      CharConfig.desc = getDescCharLen();
      appendClasses();
      checkEmptyAssets();
  }

    // test code
    function setTitle(title){
    var allTitle = document.querySelectorAll('.title-link')
    for(var i=0;i<allTitle.length;i++){
      allTitle[i].innerHTML = title;
    }
    document.querySelector('.wrapper').className = "wrapper";
    formatViewAfterLoad();
  }
  function setDesc(desc){
      document.querySelector('.body-link').innerHTML = desc;
      document.querySelector('.wrapper').className = "wrapper";
      formatViewAfterLoad();
  }
  // test code ends
  
  function isImagePresent() {
      var imageTag = document.querySelector(".image");
      if(hasClass(imageTag, 'hide')) {
          return false;
      }
      return true;
  }
  
  function hasClass(element, className) {
      return (' ' + element.className + ' ').indexOf(' ' + className+ ' ') > -1;
  }
  
  function getTitleCharLen() {
      var title = document.querySelector('.title');
      return title.textContent.length;
  }
  
  function getDescCharLen() {
      var desc = document.querySelector('.body');
      if(desc){
          return desc.textContent.length;
      }
      return '';
  }
  
  function appendClasses() {
      var wrapper = document.querySelector('.wrapper');
      var classNameTitle = getClassNameFromConfigTitle()
      if(classNameTitle){
          wrapper.classList.add(classNameTitle);
      }
      var classNameDesc = getClassNameFromConfigDesc()
      if(classNameDesc){
          wrapper.classList.add(classNameDesc);
      }
  }

  function getClassNameFromConfigTitle() {
      var cls = '';
      for(var i = 0; i < mainConfigTitle.length; i++) {
          if(CharConfig.title >= mainConfigTitle[i].title.min - bufferTitle && CharConfig.title <= mainConfigTitle[i].title.max - bufferTitle){
              cls = mainConfigTitle[i].className;
          }else if(i === 0 && CharConfig.title <= mainConfigTitle[i].title.max - bufferTitle ){
              cls = mainConfigTitle[i].className; 
          }
      }
      console.log("cls --> ", cls, "/ Title Char ",CharConfig.title);
      return cls;
  }

  function getClassNameFromConfigDesc() {
      var cls = '';
      for(var i = 0; i < mainConfigDesc.length; i++) {
          if(CharConfig.desc >= mainConfigDesc[i].desc.min - bufferDesc && CharConfig.desc <= mainConfigDesc[i].desc.max - bufferDesc){
              cls = mainConfigDesc[i].className;
          }else if(i === 0 && CharConfig.desc <= mainConfigDesc[i].desc.max - bufferDesc ){
              cls = mainConfigDesc[i].className; 
          }
      }
      console.log("cls --> ", cls, "/ desc Char ",CharConfig.desc);
      return cls;
  }

  function checkEmptyAssets(){       
        var assetName = ['call-to-action-link'];
        for(var i=0;i<assetName.length;i++){
            var elemClassName = document.getElementsByClassName(assetName[i])[0];
            if(elemClassName && !elemClassName.innerHTML){
                renderFallack(assetName[i])
            }
        }
    }

    function renderFallack(elem){
        if(elem == 'call-to-action-link'){
            var elemClass = document.getElementsByClassName(elem)
            for(var i=0;i<elemClass.length;i++){
                elemClass[i].innerHTML = "Click Here"
            }
        }
    }
  
  </script>


<!-- clean cta script  -->
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    (function cleanCtaText() {
      var ctaLinks = document.querySelectorAll('.call-to-action-link');
  
      ctaLinks.forEach(function (link) {
        var text = link.textContent || link.innerText;
  
        if (text.indexOf('>') !== -1) {
          link.textContent = text.replace(/\s*>\s*/g, '').trim();
        }
      });
    })();
  });
  </script>
